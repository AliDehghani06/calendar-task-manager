<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .logout-button-container {
            position: absolute;
            top: 1.5rem;
            left: 1.5rem;
            z-index: 10;
        }

        .logout-button-container button i {
            font-size: 2rem;
        }

        .home-button {
            @apply inline-block bg-blue-500 text-white font-bold py-3 px-8 rounded-full shadow-lg hover:bg-blue-600 transition duration-300;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 relative">

    <section id="error-404-page" class="page-section active">
        <div class="bg-white/90 backdrop-blur-sm p-8 rounded-2xl shadow-2xl w-full max-w-lg text-center">
            <h1 class="text-9xl font-extrabold text-gray-800 mb-4 animate-pulse">404</h1>
            <h2 class="text-4xl font-bold text-gray-700 mb-4">Page Not Found</h2>
            <p class="text-lg text-gray-600 mb-8">
                Oops! The page you're looking for might have been removed, had its name changed, or is temporarily unavailable.
            </p>
            
            <button type="button" onclick="navigateTo('/')" class="home-button">
                Go to Home Page
            </button>
        </div>
    </section>

    <script>
        function navigateTo(pageUrl, isLogout = false) {
            if (isLogout) {
                localStorage.removeItem('loggedInUser');
            }
            window.location.href = pageUrl;
        }
    </script>
</body>
</html>
