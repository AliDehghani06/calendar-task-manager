<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .logout-button-container {
            position: absolute;
            top: 1.5rem;
            left: 1.5rem;
            z-index: 10;
        }

        .action-button {
            min-width: 220px;
        }

        .action-button i {
            font-size: 1.5rem;
        }

        .logout-button-container button i {
            font-size: 2rem;
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-4 relative">
    <div class="logout-button-container">
        <button type="button" onclick="navigateTo('/', true)"
            class="bg-red-500 text-white font-bold rounded-full shadow-md hover:bg-red-600 transition duration-300 py-3 px-6 text-base whitespace-nowrap">
            <i class="fas fa-sign-out-alt ml-2"></i> Logout
        </button>
    </div>

    <section id="dashboard-page" class="page-section active">
        <div class="bg-white/90 backdrop-blur-sm p-8 rounded-2xl shadow-2xl w-full max-w-4xl text-center">
            <h2 id="welcome-message" class="text-5xl md:text-6xl font-bold text-gray-800 mb-8">Welcome, User!</h2>
            <p class="text-xl md:text-2xl text-gray-700 mb-8">What would you like to do today?</p>
            <div class="flex flex-col md:flex-row gap-12 items-start md:items-stretch w-full">
                <div class="flex flex-col gap-6 w-full md:w-1/3">
                    <button type="button" onclick="navigateTo('/add-task')"
                        class="action-button task-button w-full bg-blue-600 text-white font-bold py-5 px-10 rounded-full shadow-lg hover:bg-blue-700 transition duration-300 flex items-center justify-center space-x-3 text-xl whitespace-nowrap">
                        <i class="fas fa-tasks mr-2"></i> Add Task
                    </button>
                    <button type="button" onclick="navigateTo('/edit-task')"
                        class="action-button task-button w-full bg-blue-600 text-white font-bold py-5 px-10 rounded-full shadow-lg hover:bg-blue-700 transition duration-300 flex items-center justify-center space-x-3 text-xl whitespace-nowrap">
                        <i class="fas fa-edit mr-2"></i> Edit Task
                    </button>
                    <button type="button" onclick="navigateTo('/delete-task')"
                        class="action-button task-button w-full bg-blue-600 text-white font-bold py-5 px-10 rounded-full shadow-lg hover:bg-blue-700 transition duration-300 flex items-center justify-center space-x-3 text-xl whitespace-nowrap">
                        <i class="fas fa-trash-alt mr-2"></i> Delete Task
                    </button>
                </div>
                <div class="flex flex-col gap-6 flex-grow">
                    <button type="button" onclick="navigateTo('/add-event')"
                        class="action-button bg-blue-600 text-white font-bold py-5 px-10 rounded-full shadow-lg hover:bg-blue-700 transition duration-300 flex items-center justify-center space-x-3 text-xl whitespace-nowrap">
                        <i class="fas fa-calendar-plus mr-2"></i> Add Event
                    </button>
                    <button type="button" onclick="navigateTo('/show-invitations')"
                        class="action-button bg-blue-600 text-white font-bold py-5 px-10 rounded-full shadow-lg hover:bg-blue-700 transition duration-300 flex items-center justify-center space-x-3 text-xl whitespace-nowrap">
                        <i class="fas fa-envelope-open-text mr-2"></i> Show Invitations
                    </button>
                    <button type="button" onclick="navigateTo('/report')"
                        class="action-button bg-blue-600 text-white font-bold py-5 px-10 rounded-full shadow-lg hover:bg-blue-700 transition duration-300 flex items-center justify-center space-x-3 text-xl whitespace-nowrap">
                        <i class="fas fa-chart-bar mr-2"></i> Report
                    </button>
                </div>
            </div>
        </div>
    </section>

    <script>
        const welcomeMessageHeading = document.getElementById('welcome-message');
        function navigateTo(pageUrl, isLogout = false) {
            if (isLogout) {
                fetch('/logout', {
                    method: 'POST',
                    credentials: 'include'
                }).finally(() => {
                    localStorage.removeItem('loggedInUser');
                    window.location.href = pageUrl;
                });
            } else {
                window.location.href = pageUrl;
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
                welcomeMessageHeading.textContent = `Welcome 👋`;
        });
    </script>
</body>

</html>
