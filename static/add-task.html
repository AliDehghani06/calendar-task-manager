<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Task</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .logout-button-container {
            position: absolute;
            top: 1rem;
            left: 1rem;
            z-index: 10;
        }

        .input-group {
            position: relative;
        }

        .input-group input,
        .input-group textarea,
        .input-group select {
            padding-left: 1rem;
            padding-right: 2.5rem;
        }

        .input-group .icon {
            position: absolute;
            right: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
        }

        .input-group.textarea-group .icon {
            top: 1rem;
            transform: translateY(0);
        }

        .required-label::after {
            content: '*';
            color: #ef4444;
            margin-left: 0.25rem;
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-4 relative">
    <div class="logout-button-container">
        <button type="button" onclick="navigateTo('/', true)"
            class="bg-red-500 text-white font-bold rounded-full shadow-md hover:bg-red-600 transition duration-300 py-3 px-6 text-base whitespace-nowrap">
            <i class="fas fa-sign-out-alt ml-2"></i> Logout
        </button>
    </div>

    <section id="add-task-page" class="page-section active">
        <div class="bg-white/90 backdrop-blur-sm p-8 rounded-2xl shadow-2xl w-full max-w-md text-center">
            <h2 class="text-3xl font-bold text-gray-800 mb-6">Add New Task</h2>

            <div id="message-box" class="text-center text-red-600 font-bold mb-4"></div>
            <form id="add-task-form" action="/add-task" method="post" class="space-y-6">
                <div class="grid grid-cols-3 gap-4">
                    <div class="input-group">
                        <label for="task-year" class="block text-gray-700 mb-2 text-left required-label text-sm">Year
                            (SH)</label>
                        <select id="task-year" name="taskYear"
                            class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500"
                            required></select>
                    </div>
                    <div class="input-group">
                        <label for="task-month" class="block text-gray-700 mb-2 text-left required-label text-sm">Month
                            (SH)</label>
                        <select id="task-month" name="taskMonth"
                            class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500"
                            required></select>
                    </div>
                    <div class="input-group">
                        <label for="task-day"
                            class="block text-gray-700 mb-2 text-left required-label text-sm">Day</label>
                        <select id="task-day" name="taskDay"
                            class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500"
                            required></select>
                    </div>
                </div>

                <div class="input-group">
                    <label for="task-hour" class="block text-gray-700 mb-2 text-left required-label">Hour (24h)</label>
                    <i class="fas fa-clock icon"></i>
                    <input type="number" id="task-hour" name="taskHour" min="0" max="23" step="1" placeholder="HH"
                        class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500"
                        required>
                </div>

                <div class="input-group">
                    <label for="task-title" class="block text-gray-700 mb-2 text-left required-label">Title</label>
                    <i class="fas fa-heading icon"></i>
                    <input type="text" id="task-title" name="taskTitle" placeholder="Enter task title"
                        class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500"
                        required>
                </div>

                <div class="input-group textarea-group">
                    <label for="task-description" class="block text-gray-700 mb-2 text-left">Description</label>
                    <i class="fas fa-info-circle icon"></i>
                    <textarea id="task-description" name="taskDescription"
                        placeholder="Enter task description (optional)" rows="4"
                        class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500 resize-y"></textarea>
                </div>

                <button type="submit"
                    class="w-full font-bold text-white py-3 rounded-lg bg-gradient-to-r from-green-500 to-teal-500 hover:from-green-600 hover:to-teal-600 transition duration-300 shadow-lg">
                    Add Task
                </button>
            </form>

            <div class="mt-6 text-center">
                <button type="button" onclick="navigateTo('/dashboard')"
                    class="mt-4 text-gray-500 hover:text-gray-800 transition">Back to Dashboard</button>
            </div>
        </div>
    </section>

    <script>
        const taskYearSelect = document.getElementById('task-year');
        const taskMonthSelect = document.getElementById('task-month');
        const taskDaySelect = document.getElementById('task-day');

        function populateYears(selectElementId) {
            const selectElement = document.getElementById(selectElementId);
            const emptyOption = document.createElement('option');
            emptyOption.value = '';
            emptyOption.textContent = 'Select Year';
            selectElement.appendChild(emptyOption);

            const currentSolarYear = 1404;
            const endYear = currentSolarYear + 10;
            for (let year = currentSolarYear; year <= endYear; year++) {
                const option = document.createElement('option');
                option.value = year;
                option.textContent = year;
                selectElement.appendChild(option);
            }
        }

        function populateMonths(selectElementId) {
            const selectElement = document.getElementById(selectElementId);
            const emptyOption = document.createElement('option');
            emptyOption.value = '';
            emptyOption.textContent = 'Select Month';
            selectElement.appendChild(emptyOption);

            for (let i = 1; i <= 12; i++) {
                const option = document.createElement('option');
                option.value = i;
                option.textContent = i;
                selectElement.appendChild(option);
            }
        }


        function populateDays(selectElementId) {
            const selectElement = document.getElementById(selectElementId);
            const emptyOption = document.createElement('option');
            emptyOption.value = '';
            emptyOption.textContent = 'Select Day';
            selectElement.appendChild(emptyOption);

            for (let day = 1; day <= 30; day++) {
                const option = document.createElement('option');
                option.value = day;
                option.textContent = day;
                selectElement.appendChild(option);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            populateYears('task-year');
            populateMonths('task-month');
            populateDays('task-day');
        });
        function navigateTo(pageUrl, isLogout = false) {
            if (isLogout) {
                fetch('/logout', {
                    method: 'POST',
                    credentials: 'include'
                }).finally(() => {
                    localStorage.removeItem('loggedInUser');
                    window.location.href = pageUrl;
                });
            } else {
                window.location.href = pageUrl;
            }
        }

        const params = new URLSearchParams(window.location.search);
        const msg = params.get("message");
        if (msg) {
            const box = document.getElementById("message-box");
            box.innerText = decodeURIComponent(msg.replace(/\+/g, ' '));
            box.classList.remove("hidden");
        }

    </script>
</body>

</html>
