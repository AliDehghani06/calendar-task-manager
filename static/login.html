<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login to Your Account</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            min-height: 100vh;
        }

        @keyframes gradient {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        .page-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }

        .input-group {
            position: relative;
        }

        .input-group input {
            padding-left: 1rem;
            padding-right: 2.5rem;
        }

        .input-group .icon {
            position: absolute;
            right: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-4">

    <section id="login-page" class="page-section active">
        <div class="bg-white/90 backdrop-blur-sm p-8 rounded-2xl shadow-2xl w-full max-w-md">
            <h2 class="text-3xl font-bold text-center text-gray-800 mb-6">Login to Your Account</h2>

            <div id="message-box" class="text-center text-red-600 font-bold mb-4"></div>

            <form id="login-form" action="/login" method="post" class="space-y-6">
                <div class="input-group">
                    <label for="login-username" class="block text-gray-700 mb-2">Username</label>
                    <i class="fas fa-user icon"></i>
                    <input name="username" type="text" id="login-username" placeholder="Enter your username"
                        class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <div class="input-group">
                    <label for="login-password" class="block text-gray-700 mb-2">Password</label>
                    <i class="fas fa-lock icon"></i>
                    <input name="password" type="password" id="login-password" placeholder="Enter your password"
                        class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <button type="submit"
                    class="w-full font-bold text-white py-3 rounded-lg bg-gradient-to-r from-cyan-500 to-blue-500 hover:from-cyan-600 hover:to-blue-600 transition duration-300 shadow-lg">
                    Login
                </button>
            </form>

            <div class="mt-6 text-center">
                <p class="text-gray-600">Don't have an account?
                    <button onclick="navigateTo('/signup')" class="font-bold text-blue-600 hover:underline">Sign
                        Up</button>
                </p>
                <button onclick="navigateTo('/')" class="mt-4 text-gray-500 hover:text-gray-800 transition">Back to Home
                    Page</button>
            </div>
        </div>
    </section>

    <script>
        function navigateTo(pageUrl) {
            window.location.href = pageUrl;
        }

        const params = new URLSearchParams(window.location.search);
        const msg = params.get("message");
        if (msg) {
            const box = document.getElementById("message-box");
            box.innerText = decodeURIComponent(msg.replace(/\+/g, ' '));
            box.classList.remove("hidden");
        }
    </script>


</body>

</html>
