<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Task</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .logout-button-container {
            position: absolute;
            top: 1.5rem;
            left: 1.5rem;
            z-index: 10;
        }

        .logout-button-container button i {
            font-size: 2rem;
        }

        .input-group {
            position: relative;
        }
        .input-group input,
        .input-group textarea,
        .input-group select {
            padding-left: 1rem;
            padding-right: 2.5rem;
        }
        .input-group .icon {
            position: absolute;
            right: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
        }
        .input-group.textarea-group .icon {
            top: 1rem;
            transform: translateY(0);
        }

        .required-label::after {
            content: '*';
            color: #ef4444;
            margin-left: 0.25rem;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 relative">
    <div class="logout-button-container">
        <button type="button" onclick="navigateTo('/', true)"
            class="bg-red-500 text-white font-bold rounded-full shadow-md hover:bg-red-600 transition duration-300 py-3 px-6 text-base whitespace-nowrap">
            <i class="fas fa-sign-out-alt ml-2"></i> Logout
        </button>
    </div>

    <section id="delete-task-page" class="page-section active">
        <div class="bg-white/90 backdrop-blur-sm p-8 rounded-2xl shadow-2xl w-full max-w-md text-center">
            <h2 class="text-3xl font-bold text-gray-800 mb-6">Delete Task</h2>
            
            <div id="message-box" class="text-center text-red-600 font-bold mb-4"></div>

            <form id="delete-task-form" action="/delete-task" method="post" class="space-y-6">
                <div class="input-group">
                    <label for="task-id" class="block text-gray-700 mb-2 text-left required-label">Task ID</label>
                    <i class="fas fa-id-card icon"></i>
                    <input type="text" id="task-id" name="taskId" placeholder="Enter task ID to delete" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                </div>
                
                <button type="submit"
                    class="w-full font-bold text-white py-3 rounded-lg bg-gradient-to-r from-red-500 to-rose-500 hover:from-green-600 hover:to-teal-600 transition duration-300 shadow-lg">
                    Delete Task
                </button>
            </form>

            <div class="mt-6 text-center">
                <button type="button" onclick="navigateTo('/dashboard')" class="mt-4 text-gray-500 hover:text-gray-800 transition">Back to Dashboard</button>
            </div>
        </div>
    </section>

    <script>
        function navigateTo(pageUrl, isLogout = false) {
            if (isLogout) {
                fetch('/logout', {
                    method: 'POST',
                    credentials: 'include'
                }).finally(() => {
                    localStorage.removeItem('loggedInUser');
                    window.location.href = pageUrl;
                });
            } else {
                window.location.href = pageUrl;
            }
        }

        const params = new URLSearchParams(window.location.search);
        const msg = params.get("message");
        if (msg) {
            const box = document.getElementById("message-box");
            if (box) {
                box.innerText = decodeURIComponent(msg.replace(/\+/g, ' '));
                box.classList.remove("hidden");
            }
        }
    </script>
</body>
</html>
