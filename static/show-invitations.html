<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Invitations</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .logout-button-container {
            position: absolute;
            top: 1.5rem;
            left: 1.5rem;
            z-index: 10;
        }

        .logout-button-container button i {
            font-size: 2rem;
        }

        .invitation-item {
            padding: 1rem;
            background-color: #f3f4f6;
            border-radius: 0.5rem;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            margin-bottom: 1rem;
            border-bottom-width: 2px;
            border-color: #e5e7eb;
            text-align: left;
        }

        .input-group {
            position: relative;
        }
        .input-group input,
        .input-group select {
            padding-left: 1rem;
            padding-right: 2.5rem;
        }
        .input-group .icon {
            position: absolute;
            right: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-4 relative">
    <div class="logout-button-container">
        <button type="button" onclick="navigateTo('/', true)"
            class="bg-red-500 text-white font-bold rounded-full shadow-md hover:bg-red-600 transition duration-300 py-3 px-6 text-base whitespace-nowrap">
            <i class="fas fa-sign-out-alt ml-2"></i> Logout
        </button>
    </div>

    <section id="show-invitations-page" class="page-section active">
        <div class="bg-white/90 backdrop-blur-sm p-8 rounded-2xl shadow-2xl w-full max-w-2xl text-center">
            <h2 class="text-3xl font-bold text-gray-800 mb-6">Your Invitations</h2>
            <form id="invitation-action-form" action="#" method="post" onsubmit="handleInvitationAction(event)" class="space-y-4 mb-6">
                <h3 class="text-xl font-bold text-gray-700 text-left">Action on Invitation</h3>
                <div class="input-group">
                    <label for="invitation-id-input" class="block text-gray-700 mb-2 text-left">Invitation ID</label>
                    <input type="number" id="invitation-id-input" name="invitationId" placeholder="Enter Invitation ID"
                        class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                </div>
                
                <div class="input-group">
                    <label for="action-select" class="block text-gray-700 mb-2 text-left">Select Action</label>
                    <select id="action-select" name="actionType" 
                        class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                        <option value="">Choose an action</option>
                        <option value="confirm_join_event">Confirm</option>
                        <option value="reject_join_event">Reject</option>
                    </select>
                </div>
                
                <div class="flex justify-center">
                    <button type="submit" id="perform-action-btn"
                        class="bg-blue-500 text-white font-bold py-2 px-5 rounded-full shadow-md hover:bg-blue-600 transition duration-300 text-base">Perform Action</button>
                </div>
            </form>

            <div class="mb-6 h-96 overflow-y-auto border border-gray-300 rounded-lg p-4">
                <ul id="invitations-list" class="space-y-3">
                    <p id="no-invitations-message" class="text-gray-500 text-lg mt-4">Empty</p>
                </ul>
            </div>

            <div class="mt-6 text-center">
                <button type="button" onclick="navigateTo('/dashboard')"
                    class="mt-4 text-gray-500 hover:text-gray-800 transition">Back to Dashboard</button>
            </div>
        </div>
    </section>

    <script>
        let invitations = [];

        const invitationIdInput = document.getElementById('invitation-id-input');
        const actionSelect = document.getElementById('action-select');
        const invitationsList = document.getElementById('invitations-list');
        const noInvitationsMessage = document.getElementById('no-invitations-message');

        async function fetchInvitations() {
            try {
                const response = await fetch('/api/invitations');
                if (!response.ok) throw new Error('Network response was not ok');

                invitations = await response.json();
                renderInvitations();
            } catch (error) {
                console.error('Failed to load invitations:', error);
                invitationsList.innerHTML = '<p class="text-gray-500 text-lg mt-4">Failed to load invitations.</p>';
            }
        }

        function renderInvitations() {
            invitationsList.innerHTML = '';

            if (!invitations.length) {
                noInvitationsMessage.style.display = 'block';
                return;
            } else {
                noInvitationsMessage.style.display = 'none';
            }

            invitations.forEach(invitation => {
                const listItem = document.createElement('li');
                listItem.className = 'invitation-item';
                listItem.dataset.id = invitation.id;

                listItem.innerHTML = `
                <div class="flex justify-between items-center mb-1">
                    <p class="font-bold text-lg">${invitation.id}: "${invitation.title}"</p>
                </div>
                <p class="text-gray-600 text-sm">Date: ${invitation.date} | Time: ${invitation.startHour}:00 - ${invitation.endHour}:00</p>
            `;
                invitationsList.appendChild(listItem);
            });
        }

        async function handleInvitationAction(event) {
            event.preventDefault();

            const idToProcess = invitationIdInput.value.trim();
            const action = actionSelect.value;

            if (!idToProcess) {
                console.warn('Please enter an Invitation ID.');
                return;
            }
            if (!action) {
                console.warn('Please select an action (Confirm or Reject).');
                return;
            }

            try {
                const backendApiUrl = `/action/invitations`;

                const formData = new FormData();
                formData.append('invitationId', idToProcess);
                formData.append('actionType', action);

                const response = await fetch(backendApiUrl, {
                    method: 'POST',
                    body: formData,
                    credentials: 'include'
                });

                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({ message: `Failed to ${action} invitation.` }));
                    throw new Error(errorData.message || 'Network response was not ok.');
                }

                invitations = invitations.filter(inv => inv.id !== idToProcess);
                renderInvitations();
                invitationIdInput.value = '';
                actionSelect.value = '';
                console.log(`Invitation ${idToProcess} ${action}ed.`);
            } catch (error) {
                console.error(`Error ${action}ing invitation:`, error);
            }
        }

        document.addEventListener('DOMContentLoaded', fetchInvitations);

        function navigateTo(pageUrl, isLogout = false) {
            if (isLogout) {
                fetch('/logout', {
                    method: 'POST',
                    credentials: 'include'
                }).finally(() => {
                    localStorage.removeItem('loggedInUser');
                    window.location.href = pageUrl;
                });
            } else {
                window.location.href = pageUrl;
            }
        }
    </script>

</body>

</html>
